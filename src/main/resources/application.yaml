server:
  port: 8081
spring:
  application:
    name: order-service

  # ── DATABASE ──────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ───────────────────────────────────────
  jpa:
    # NEVER use create or update — Flyway manages schema
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # ── FLYWAY ────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest

app:
  kafka:
    topic:
      order-status-changed: order-status-changed

# ── ACTUATOR / OBSERVABILITY ──────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

---
# ── TEST PROFILE ──────────────────────────────
spring:
  config:

    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:15:///orderdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  main:
    allow-bean-definition-overriding: true